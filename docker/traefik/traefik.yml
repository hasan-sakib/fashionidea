# Traefik static configuration (local development).
# Routing is defined in dynamic.yml via the file provider. We deliberately avoid
# the Docker provider: Docker Engine 29 (API v1.54) is incompatible with the
# Docker client bundled in Traefik v3.3, and the file provider needs no socket.

entryPoints:
  web:
    address: ":80"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

api:
  # Dashboard on Traefik's built-in :8080 entrypoint.
  dashboard: true
  insecure: true

log:
  level: INFO

accessLog: {}
