# Fashion Idea — local orchestration.
# Bring up:  cp docker/.env.example .env && docker compose up --build
#
# Routing (Traefik, :80):
#   api.localhost         -> backend
#   <anything>/api/...    -> backend   (so designer1.localhost/api/... works)
#   localhost, *.localhost-> frontend SPA
#   traefik dashboard     -> :8080

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fashionidea

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: db
      # Uploaded images live outside /app (own volume) so the source bind-mount
      # can't shadow them and they persist across rebuilds.
      UPLOAD_DIR: /uploads
    volumes:
      # Hot reload: mount source only. The virtualenv lives at /opt/venv (outside
      # /app), so no anonymous-volume shadowing is needed.
      - ./backend:/app
      - backend-uploads:/uploads
    depends_on:
      db:
        condition: service_healthy
    # Routing is defined in docker/traefik/dynamic.yml (file provider), which
    # reaches this service by name (http://backend:8000) over the shared network.
    networks:
      - fashionidea

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Hot reload: mount source only. node_modules lives at /node_modules (parent
      # of /app, set in the Dockerfile), so this bind-mount can't shadow it and no
      # node_modules volume is needed.
      - ./frontend:/app
    depends_on:
      - backend
    # Routing is defined in docker/traefik/dynamic.yml (file provider), which
    # reaches this service by name (http://frontend:5173) over the shared network.
    networks:
      - fashionidea

  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      # Static config in traefik.yml; api.insecure exposes the dashboard on :8080.
      # Routing comes from the file provider (dynamic.yml) — no Docker socket needed.
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - fashionidea

volumes:
  db-data:
  backend-uploads:

networks:
  fashionidea:
    driver: bridge
